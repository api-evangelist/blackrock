specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: BlackRock
providerId: blackrock
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Asset Management
  - Finance
  - Investment Management
  - Risk Analytics
  - Rate Limiting
description: BlackRock's Aladdin and eFront platforms do not publish public API rate limits.
  Throttling, concurrency caps, and quota policies are governed by the customer's Aladdin Studio /
  Provider contract and tenant configuration rather than a public developer policy.
sources:
  - https://www.blackrock.com/aladdin
notes: No public rate-limit page; enterprise contract and customer success contact are the
  authoritative source. Reconcile against active tenant configuration.
responseCodes:
  throttled: 429
limits:
  - name: Aladdin Studio / Provider APIs
    scope: tenant
    metric: varies
    limit: see Aladdin contract / tenant configuration
    notes: Per-tenant request rate, concurrency, and batch size ceilings are negotiated and
      configured per customer; no public numbers exist.
policies:
  - name: Tenant-scoped throttling
    description: Limits apply per Aladdin tenant; raises require Aladdin client services engagement.
  - name: Backoff
    description: Clients should respect Retry-After when present and use exponential backoff with
      jitter on 429 responses.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
