specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: BlackRock
providerId: blackrock
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Asset Management
  - Investment Management
description: 'FOCUS-aligned FinOps placeholder for BlackRock: spend is dominated by enterprise Aladdin
  / eFront subscription contracts plus negotiated per-asset / per-AUM fee components. No public
  per-call billing surface.'
sources:
  - https://www.blackrock.com/aladdin
notes: Aladdin commercial terms are private; reconcile against the active enterprise contract for
  the actual fee structure.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: BlackRock, Inc.
serviceCategory: Asset Management Technology
billingModel:
  pricingCategory: Enterprise Subscription (Negotiated)
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Aladdin
  ServiceCategory: Investment Management Platform
  ProviderName: BlackRock
  PublisherName: BlackRock, Inc.
  InvoiceIssuerName: BlackRock, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: aladdin_subscription
    unit: year
    aggregation: sum
    dimensions:
      - module
      - tenant
  - name: aum_under_management
    unit: USD
    aggregation: avg
    dimensions:
      - asset_class
      - region
  - name: named_users
    unit: seat
    aggregation: max
    dimensions:
      - tenant
      - role
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - tenant
principles:
  - name: Visibility
    description: Use Aladdin Studio's tenant administration consoles and the BlackRock client
      reporting deliverables to track module activation and named-user counts.
  - name: Allocation
    description: Map Aladdin modules and AUM tracked on the platform to the consuming desk / fund
      family for chargeback.
  - name: Optimization
    description: Reclaim unused named-user seats during annual renewal; consolidate eFront and
      Aladdin Studio modules; align AUM-based fee triggers with portfolio rebalancing schedule.
  - name: Accountability
    description: Designate an Aladdin contract owner per legal entity; review the Aladdin Studio
      utilization report quarterly with the BlackRock client services team.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
