apis:
  - aid: blackrock:aladdin-api
    name: BlackRock Aladdin API
    description: >-
      The Aladdin Developer program provides APIs that enable clients to access
      BlackRock's Aladdin platform capabilities programmatically. Aladdin APIs
      support portfolio analytics, risk reporting, data access, order management,
      and workflow automation for institutional asset managers, wealth managers,
      and financial services clients.
