name: BlackRock
description: >-
  BlackRock is the world's largest asset manager with over $10 trillion in assets under
  management. Through its Aladdin platform, BlackRock provides institutional investors,
  wealth managers, and financial services firms with risk analytics, portfolio management,
  and data capabilities via APIs. The Aladdin platform powers investment operations for
  many of the world's largest pension funds, insurers, and asset managers.
