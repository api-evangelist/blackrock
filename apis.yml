  - type: Features
    data:
      - name: Aladdin Risk Analytics
        description: >-
          Multi-asset risk measurement and attribution capabilities accessible
          via API, including VaR, factor exposures, stress testing, and scenario
          analysis.
      - name: Portfolio Management APIs
        description: >-
          APIs for portfolio construction, optimization, rebalancing, and
          compliance monitoring integrated with the Aladdin operating system.
      - name: Data Access Layer
        description: >-
          Structured access to market data, security reference data, and
          portfolio data via RESTful APIs with enterprise data governance.
      - name: Order Management System Integration
        description: >-
          APIs for trade order management, execution, and settlement workflows
          integrating with OMS and EMS systems.
      - name: AladdinSDK
        description: >-
          Open-source Python SDK providing programmatic access to Aladdin APIs
          with authentication, pagination, and data transformation utilities.
      - name: Workflow Automation
        description: >-
          Event-driven workflow APIs enabling clients to automate investment
          operations processes and integrate with third-party systems.
  - type: UseCases
    data:
      - name: Institutional Risk Reporting
        description: >-
          Institutional investors use Aladdin APIs to generate regulatory risk
          reports, UCITS compliance reports, and investor disclosures.
      - name: Portfolio Analytics Integration
        description: >-
          Wealth managers and RIAs integrate Aladdin risk analytics into their
          own client-facing and advisor-facing platforms.
      - name: Fintech Data Integration
        description: >-
          FinTech companies access structured investment data through Aladdin
          APIs to power analytics, research, and advisory products.
      - name: Automated Rebalancing
        description: >-
          Portfolio managers automate rebalancing workflows using Aladdin APIs
          to trigger trades based on drift thresholds and target allocations.
      - name: Multi-Manager Aggregation
        description: >-
          Family offices and fund-of-funds use Aladdin APIs to aggregate
          portfolio data across multiple managers into a single risk view.
  - type: Integrations
    data:
      - name: Charles River Development
        description: >-
          Aladdin integrates with Charles River IMS for order management and
          compliance workflow automation.
      - name: SimCorp Dimension
        description: >-
          Integration between Aladdin risk analytics and SimCorp's portfolio
          management and accounting systems.
      - name: Bloomberg
        description: >-
          Market data and analytics integrations with Bloomberg Data License
          and Bloomberg PORT for risk and performance.
      - name: Refinitiv
        description: >-
          Security master data and market data integrations with Refinitiv
          Datascope and Eikon platforms.
